name: 获取Gitee版本信息

on:
  workflow_dispatch: # 手动触发

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    name: 调用接口并打印

    steps:
      - name: 请求接口并打印Body
        run: |
          echo "====== 开始请求 Gitee 接口 ======"
          
          # -sS: 静默进度但显示错误
          # -L: 跟随重定向 (Gitee某些情况可能会302跳转)
          # --connect-timeout 10: 连接超时10秒
          # --max-time 30: 总超时30秒
          # -w "\n状态码: %{http_code}\n": 无论成功失败，最后打印HTTP状态码
          
          RESPONSE=$(curl -sS -L --connect-timeout 10 --max-time 30 \
            -w "\n状态码: %{http_code}\n" \
            "https://gitee.com/aliawhy/mini-service-data-downloader/raw/version_alili-xianlutong-train-report-msg/version/alili-xianlutong-train-report-msg.version.json" 2>&1)
          
          echo "====== 响应内容如下 ======"
          # 使用 printf 防止某些特殊情况下的空白吞没，确保100%输出
          printf "%s\n" "$RESPONSE"
          
          echo "====== 检查完毕 ======"
